<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synder Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e6;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #6b7280;
            margin-bottom: 48px;
            font-size: 0.95rem;
        }
        .grid { display: flex; gap: 20px; margin-top: 16px; }
        @media (max-width: 600px) { .grid { flex-direction: column; } }
        a.card {
            flex: 1;
            background: #13131a;
            border: 1px solid #1e1e2a;
            border-radius: 16px;
            padding: 40px 32px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
            text-align: center;
        }
        a.card:hover {
            border-color: #6366f1;
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(99, 102, 241, 0.12);
        }
        .card-icon { font-size: 3rem; margin-bottom: 20px; }
        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #f0f0f5;
            margin-bottom: 8px;
        }
        .card-desc { color: #8b8b9a; font-size: 0.9rem; line-height: 1.5; }
        .card-count {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #6366f1;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Synder Tools</h1>
        <p class="subtitle">UX tools & prototypes by Ignat & Dasha</p>

        <div class="grid">
            <a href="./tools/" class="card">
                <div class="card-icon">🛠</div>
                <div class="card-title">Tools</div>
                <div class="card-desc">Generators and utilities for UX work</div>
                <div class="card-count">2 items</div>
            </a>
            <a href="./audits/" class="card">
                <div class="card-icon">🔍</div>
                <div class="card-title">Audits</div>
                <div class="card-desc">UX & copy audits and findings</div>
                <div class="card-count">2 items</div>
            </a>
            <a href="./prototypes/" class="card">
                <div class="card-icon">🎨</div>
                <div class="card-title">Prototypes</div>
                <div class="card-desc">Interactive UI prototypes and design explorations</div>
                <div class="card-count">4 items</div>
            </a>
        </div>
    </div>
</body>
</html>
