<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synder Prototypes Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e6;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #6b7280;
            margin-bottom: 48px;
            font-size: 0.95rem;
        }
        .prototypes { display: flex; flex-direction: column; gap: 16px; }
        .proto-card {
            background: #13131a;
            border: 1px solid #1e1e2a;
            border-radius: 12px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
        }
        .proto-card:hover {
            border-color: #6366f1;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.1);
        }
        .proto-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #f0f0f5;
        }
        .proto-desc { color: #8b8b9a; font-size: 0.9rem; margin-bottom: 12px; }
        .proto-meta { display: flex; gap: 16px; font-size: 0.8rem; color: #555; }
        .proto-tag {
            background: #1a1a2e;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #8b5cf6;
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #4b5563;
        }
        .empty-state p { margin-top: 12px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 Synder Prototypes</h1>
        <p class="subtitle">Interactive UX prototypes by Ignat & Dasha</p>

        <div class="prototypes">
            <div class="empty-state">
                <p style="font-size: 2rem;">🚧</p>
                <p>No prototypes yet. They'll appear here as we build them.</p>
            </div>

            <!-- PROTOTYPE TEMPLATE (uncomment & duplicate for each new prototype):
            <a href="./prototype-folder/" class="proto-card">
                <div class="proto-title">Prototype Name</div>
                <div class="proto-desc">Short description of what this prototype explores.</div>
                <div class="proto-meta">
                    <span class="proto-tag">Category</span>
                    <span>Added: 2026-03-26</span>
                </div>
            </a>
            -->
        </div>
    </div>
</body>
</html>
