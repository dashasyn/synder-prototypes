  }

/* Pattern cluster the 44 missing-in-acc items by type+amount */
function clusterRows(rows) {
  const groups = {};
  for (const r of rows) {
    const key = r.type + '|' + r.amount + '|' + (r.description || '');
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  }
  return Object.entries(groups)
    .map(([k, rs]) => ({ key: k, rows: rs, total: rs.reduce((s, r) => s + (r.amount || 0), 0), sample: rs[0], count: rs.length }))
    .sort((a, b) => b.count - a.count);
}

function fmtAmount(n, currency) {
  if (n === null || n === undefined) return '<span class="null-cell"></span>';
  const formatted = Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const sign = n < 0 ? '-' : '';
  return sign + formatted + ' ' + (currency || '');
}

function fmtDate(d) {
  if (!d) return '<span class="null-cell"></span>';
  // "2026-01-30" → "Jan 30, 2026"
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || ''); }

function sumAmounts(rows) {
  return rows.reduce((s, r) => s + (r.amount || 0), 0);
}

    <button class="active has-alert">Not matched <span class="count">${s.notMatchedCount}</span></button>
    <button>Ignored <span class="count">${s.ignoredCount}</span></button>
  </div>

  <!-- SHARED single filter bar with chip-based type filter -->
  <div class="shared-filter">
    <div class="field"><label>Search</label><input placeholder="Search by ID, amount, description..."></div>
    <div class="field"><label>Date range</label><input type="date" value="2026-01-01"></div>
    <div class="field"><label>to</label><input type="date" value="2026-01-31"></div>
    <div class="field"><label>Amount</label><input placeholder="e.g. 21.61 or >100"></div>
    <div class="actions">
      <button class="btn-primary">Apply</button>
      <button class="btn-ghost">Reset</button>
    </div>
  </div>
  <div class="shared-filter" style="margin-top:-12px;">
    <div class="field wide">
      <label>Quick filters</label>
      <div class="chips">
        <span class="chip active">All types</span>
        <span class="chip">Charges (24)</span>
        <span class="chip">Payouts (20)</span>
        <span class="chip">⚠ Broken rows (6)</span>
        <span class="chip">Negative only</span>
        <span class="chip">Over $100</span>
      </div>
    </div>
  </div>

  <!-- Bulk selection bar (hidden by default, shown when items are checked) -->
  <div class="bulk-bar" id="bulkBar" style="display:none;">
    <span class="count"><span id="bulkCount">0</span> selected</span>
    <div class="spacer"></div>
    <button class="primary">⇄ Match selected</button>
    <button>Mark as expected</button>
    <button>Ignore selected</button>
    <button class="close" onclick="clearBulk()">✕</button>
  </div>

  <div class="panels">
    <!-- LEFT: Missing in accounting (clustered) -->
    <div class="panel">
      <h2>Missing in accounting <span class="count-pill">${DATA.missingInAcc.length} items · ${totalAcc < 0 ? '-' : ''}${Math.abs(totalAcc).toFixed(2)} ${m.currency}</span></h2>

      ${clusters.map((c, idx) => `
        <div class="cluster ${idx === 0 ? 'expanded' : ''}" id="cluster-${idx}">
          <div class="cluster-header" onclick="toggleCluster(${idx}, event)">
            <span class="chevron">▶</span>
            <input type="checkbox" onclick="event.stopPropagation();toggleBulk()">
            <div class="summary">
              <div class="title">${c.count}× ${c.sample.type} of ${fmtAmount(c.sample.amount, c.sample.currency)}${c.sample.description ? ' — ' + c.sample.description : ''}</div>
              <div class="meta">${fmtDate(c.rows[c.rows.length-1].date)} → ${fmtDate(c.rows[0].date)} · looks like recurring subscription pattern</div>
            </div>
            <div class="total ${c.total < 0 ? 'neg' : ''}">${c.total < 0 ? '-' : ''}${Math.abs(c.total).toFixed(2)} ${m.currency}</div>
            <div class="actions" onclick="event.stopPropagation()">
              <button>Match all →</button>
              <button>Ignore all</button>
            </div>
          </div>
          <div class="cluster-body">
            <table class="tbl">
              <thead><tr><th class="check-col"></th><th>Date</th><th>Primary ID</th><th>Secondary ID</th><th class="num">Amount</th></tr></thead>
              <tbody>
                ${c.rows.slice(0, 6).map(r => `
                  <tr>
                    <td class="check-col"><input type="checkbox" onclick="toggleBulk()"></td>
                    <td>${fmtDate(r.date)}</td>
                    <td class="id" title="${r.primaryId}">${truncate(r.primaryId, 24)}</td>
                    <td class="id" title="${r.secondaryId}">${truncate(r.secondaryId, 24)}</td>
                    <td class="num ${r.amount < 0 ? 'neg' : ''}">${fmtAmount(r.amount, r.currency)}</td>
                  </tr>`).join('')}
                ${c.rows.length > 6 ? `<tr><td colspan="5" style="text-align:center;padding:12px;color:var(--g50);"><a href="#" onclick="return false;">Show all ${c.rows.length} rows</a></td></tr>` : ''}
              </tbody>
            </table>
          </div>
        </div>`).join('')}
    </div>

    <!-- RIGHT: Missing in integration -->
    <div class="panel">
      <h2>Missing in integration <span class="count-pill">${DATA.missingInPp.length} items</span></h2>

      ${brokenRows.length > 0 ? `
      <div class="cluster expanded" style="border-color:#F4C2C2;">
        <div class="cluster-header" style="background:var(--red-l);">
          <span class="chevron">▼</span>
          <input type="checkbox" onclick="event.stopPropagation();toggleBulk()">
          <div class="summary">
            <div class="title" style="color:var(--red);">⚠ ${brokenRows.length} rows with broken column mapping</div>
            <div class="meta">Dates and amounts are missing. Fix the column mapping to resolve these automatically.</div>
          </div>
          <div class="actions" onclick="event.stopPropagation()">
            <button style="border-color:var(--red);color:var(--red);">Fix mapping →</button>
          </div>
        </div>
        <div class="cluster-body">
          <table class="tbl">
            <thead><tr><th class="check-col"></th><th>Date</th><th>Primary ID</th><th>Secondary ID</th><th>Type</th><th class="num">Amount</th></tr></thead>
            <tbody>
              ${brokenRows.map(r => `
                <tr class="row-error">
                  <td class="check-col"><input type="checkbox" onclick="toggleBulk()"></td>
                  <td><span class="null-cell"></span></td>
                  <td class="id" title="${r.primaryId}">${truncate(r.primaryId, 24)}</td>
                  <td class="id">${r.secondaryId}</td>
                  <td>${r.type}</td>
                  <td class="num"><span class="null-cell"></span></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>` : ''}

      ${validPpRows.length > 0 ? `
      <div class="cluster expanded">
        <div class="cluster-header">
          <span class="chevron">▼</span>
          <input type="checkbox" onclick="event.stopPropagation();toggleBulk()">
          <div class="summary">
            <div class="title">${validPpRows.length} valid unmatched items</div>
            <div class="meta">Review individually</div>
          </div>
        </div>
        <div class="cluster-body">
          <table class="tbl">
            <thead><tr><th class="check-col"></th><th>Date</th><th>Primary ID</th><th>Type</th><th class="num">Amount</th></tr></thead>
            <tbody>
              ${validPpRows.map(r => `
                <tr>
                  <td class="check-col"><input type="checkbox" onclick="toggleBulk()"></td>
                  <td>${fmtDate(r.date)}</td>
                  <td class="id" title="${r.primaryId}">${truncate(r.primaryId, 24)}</td>
                  <td>${r.type}</td>
                  <td class="num ${(r.amount||0) < 0 ? 'neg' : ''}">${fmtAmount(r.amount, r.currency)}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>` : ''}

      <div style="background:var(--primary-5);border:1px dashed var(--primary);border-radius:6px;padding:16px;text-align:center;margin-top:16px;color:var(--g50);font-size:13px;">
        💡 <b>Reconciliation insight:</b> The 44 items on the left appear to be a single recurring Stripe subscription ($21.61/day).<br>
        Once you fix the column mapping on the right, Synder will likely match all 44 automatically.
      </div>
    </div>
  </div>

  <div class="proto-notes">
    <h4>✨ What changed in the improved view</h4>
    <ul>
      <li><b>Auto-detected root cause</b> — the column mapping error that caused 6 broken rows is surfaced as an actionable banner with a one-click fix.</li>
      <li><b>Pattern clustering</b> — the 44 left-side items collapse into 5 clusters (24× charge $21.61, 15× payout -$21.61, etc.) so users see the <i>story</i> instead of 44 lookalike rows.</li>
      <li><b>Bulk actions per cluster</b> — Match all / Ignore all at the cluster level. One click resolves the whole recurring subscription pattern.</li>
      <li><b>Progress snapshot</b> replaces the scary warning banner with a calm visualization of what's done / to do.</li>
      <li><b>Single shared filter bar</b> — no more duplicated search/date/amount fields. Chips for quick type filtering.</li>
      <li><b>Bulk selection bar</b> appears when items are selected, with Match / Mark expected / Ignore actions (matches existing Match modal pattern if it exists).</li>
      <li><b>Totals in panel headers</b> — users see the dollar impact at a glance.</li>
      <li><b>Broken rows visually distinct</b> — red tint, italic dashes for null fields, dedicated cluster with "Fix mapping" CTA.</li>
      <li><b>Insight footer</b> — helps users connect the two sides ("44 items look like a recurring pattern — fixing mapping will likely auto-match them").</li>
    </ul>
  </div>
  </div><!-- /page -->
  `;
}

/* ============================================================
   SIDE-BY-SIDE VIEW
   ============================================================ */
function renderSide() {
  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;padding-top:20px;">
      <div style="border:2px solid var(--g20);border-radius:8px;overflow:hidden;background:var(--white);">
        <div style="background:var(--g10);padding:10px 16px;font-weight:700;font-size:13px;border-bottom:1px solid var(--g20);">📸 CURRENT (Synder v11.6.85)</div>
        <div style="transform:scale(.58);transform-origin:top left;width:172.4%;height:820px;overflow:hidden;">
          ${renderCurrent()}
        </div>
      </div>
      <div style="border:2px solid var(--primary);border-radius:8px;overflow:hidden;background:var(--white);">
        <div style="background:var(--primary-10);padding:10px 16px;font-weight:700;font-size:13px;border-bottom:1px solid var(--primary);color:var(--primary);">✨ PROPOSED</div>
        <div style="transform:scale(.58);transform-origin:top left;width:172.4%;height:820px;overflow:hidden;">
          ${renderImproved()}
        </div>
      </div>
    </div>
  `;
}

/* Mode switcher */
function setMode(mode) {
  const root = document.getElementById('pageRoot');
  document.querySelectorAll('.proto-bar .seg button').forEach(b => b.classList.remove('active'));
  document.getElementById('mode-' + mode).classList.add('active');
  const tag = document.getElementById('modeTag');
  if (mode === 'current') {
    root.innerHTML = renderCurrent();
    tag.textContent = 'CURRENT';
    tag.style.background = 'rgba(180,187,203,.3)';
  } else if (mode === 'side') {
    root.innerHTML = renderSide();
    tag.textContent = 'SIDE BY SIDE';
    tag.style.background = 'rgba(123,97,255,.3)';
  } else {
    root.innerHTML = renderImproved();
    tag.textContent = 'IMPROVED';
    tag.style.background = 'rgba(31,137,64,.4)';
  }
  window.scrollTo(0, 0);
}

function toggleCluster(idx, event) {
  if (event && (event.target.closest('.actions') || event.target.closest('input'))) return;
  document.getElementById('cluster-' + idx).classList.toggle('expanded');
}

function toggleBulk() {
  const checked = document.querySelectorAll('.tbl input[type=checkbox]:checked, .cluster-header input[type=checkbox]:checked').length;
  const bar = document.getElementById('bulkBar');
  if (bar) {
    bar.style.display = checked > 0 ? 'flex' : 'none';
    const cnt = document.getElementById('bulkCount');
    if (cnt) cnt.textContent = checked;
  }
}

function clearBulk() {
  document.querySelectorAll('input[type=checkbox]:checked').forEach(c => c.checked = false);
  toggleBulk();
}

// Initial render
setMode('improved');
</script>
</body>
</html>
