<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audits — Synder Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e6;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .back { color: #6366f1; text-decoration: none; font-size: 0.85rem; display: inline-block; margin-bottom: 24px; }
        .back:hover { text-decoration: underline; }
        h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; color: #f0f0f5; }
        .subtitle { color: #6b7280; margin-bottom: 32px; font-size: 0.9rem; }
        .grid { display: flex; flex-direction: column; gap: 12px; }
        a.card {
            background: #13131a;
            border: 1px solid #1e1e2a;
            border-radius: 12px;
            padding: 20px 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        a.card:hover {
            border-color: #f59e0b;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(245, 158, 11, 0.1);
        }
        .card-icon { font-size: 1.5rem; flex-shrink: 0; }
        .card-body { flex: 1; }
        .card-title { font-size: 1rem; font-weight: 600; color: #f0f0f5; margin-bottom: 4px; }
        .card-desc { color: #8b8b9a; font-size: 0.85rem; }
        .tag {
            background: #1a1a2e;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #f59e0b;
            flex-shrink: 0;
        }
        .arrow { color: #4b5563; font-size: 1.2rem; flex-shrink: 0; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back">← Synder Tools</a>
        <h1>🔍 Audits</h1>
        <p class="subtitle">UX & copy audits and findings</p>

        <div class="grid">
            <a href="../per-transaction-audit/" class="card">
                <div class="card-icon">📋</div>
                <div class="card-body">
                    <div class="card-title">Per Transaction Audit</div>
                    <div class="card-desc">UX & copy audit of all Settings tabs — QBO (11 tabs) + Xero diff</div>
                </div>
                <span class="tag">audit</span>
                <span class="arrow">→</span>
            </a>
            <a href="../error-copy-audit/" class="card">
                <div class="card-icon">⚠️</div>
                <div class="card-body">
                    <div class="card-title">Error Copy Audit</div>
                    <div class="card-desc">All error messages, warnings & validation copy across Settings</div>
                </div>
                <span class="tag">audit</span>
                <span class="arrow">→</span>
            </a>
        </div>
    </div>
</body>
</html>
