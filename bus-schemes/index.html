<!DOCTYPE html>
<html lang="be">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Схемы прыпынкаў — Мінск</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>🚌 Схемы прыпынкаў Мінска</h1>
            <p class="subtitle">Генератар схем маршрутаў для прыпынкаў грамадскага транспарту</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <label for="csv-upload">📂 Загрузіць CSV файл з маршрутамі:</label>
                <div class="upload-row">
                    <input type="file" id="csv-upload" accept=".csv">
                    <button id="btn-load-sample" class="btn btn-secondary">Выкарыстаць узор</button>
                </div>
            </div>

            <div class="control-group">
                <label for="stop-select">📍 Абярыце прыпынак:</label>
                <select id="stop-select" disabled>
                    <option value="">— спачатку загрузіце дадзеныя —</option>
                </select>
            </div>

            <div class="control-group buttons-row">
                <button id="btn-generate" class="btn btn-primary" disabled>Стварыць схему</button>
                <button id="btn-export-png" class="btn btn-secondary" disabled>📥 Экспарт PNG</button>
                <button id="btn-export-svg" class="btn btn-secondary" disabled>📥 Экспарт SVG</button>
            </div>
        </div>

        <div class="stats" id="stats" style="display:none"></div>

        <div class="scheme-container" id="scheme-container">
            <div class="placeholder">
                <span>👆 Загрузіце дадзеныя і абярыце прыпынак</span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
